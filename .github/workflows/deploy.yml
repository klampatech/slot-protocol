name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one concurrent deployment, queueing newer runs and canceling
# older in-progress ones to avoid stale deployments racing each other.
concurrency:
  group: pages
  cancel-in-progress: true

# Required for OIDC-based deploys via actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Deploy site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Stage site files
        run: |
          # actions/upload-pages-artifact expects a single directory,
          # so copy just the public site assets into a staging dir.
          mkdir -p _site
          cp index.html _site/
          cp svg-icons.js _site/
          cp -r audio _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
